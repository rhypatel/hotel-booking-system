<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Reservation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      color: #2c3e50;
      text-align: center;
    }

    .top-nav {
      background: #1f3c58;
      padding: 15px 20px;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .top-nav a {
      display: inline-block;
      padding: 10px 14px;
      background: white;
      color: #1f3c58;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.22s ease;
      margin: 0;
    }

    .top-nav a:hover {
      background: #dfe6ec;
    }

    .wrapper {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      color: #1f3c58;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
      margin-bottom: 20px;
    }

    button,
    .button-link {
      width: 100%;
      padding: 12px;
      background: #1f3c58;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      box-sizing: border-box;
      margin-top: 12px;
    }

    button:hover,
    .button-link:hover {
      background: #163147;
    }

    .error-message {
      color: #c0392b;
      font-weight: bold;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<div class="top-nav">
  <a href="/browse">Browse Rooms</a>
  <a href="/photos">Photos</a>
  <a href="/guest-map">View Floor Map</a>
  <a href="/recommend">Get Recommendation</a>
  <a href="/book-room">Book a Room</a>
  <a href="/manage-booking">Manage Reservation</a>

  <a th:if="${session.guestUserEmail != null}" href="/guest-dashboard">Guest Dashboard</a>
  <a th:if="${session.guestUserEmail != null}" href="/guest-logout">Logout</a>

  <a th:if="${session.guestUserEmail == null}" href="/guest-login">Guest Login</a>
  <a th:if="${session.guestUserEmail == null}" href="/guest-signup">Guest Sign Up</a>

  <a href="/login">Admin Login</a>
</div>

<div class="wrapper">
  <h1>Manage Reservation</h1>
  <p>Enter your booking ID to view your reservation details.</p>

  <div th:if="${error}" class="error-message">
    <span th:text="${error}"></span>
  </div>

  <form action="/manage-booking" method="post">
    <input type="number" name="bookingId" placeholder="Enter Booking ID" required>
    <button type="submit">Find Reservation</button>
  </form>

  <a th:if="${session.guestUserEmail != null}" href="/guest-dashboard" class="button-link">
    Back to Guest Dashboard
  </a>
</div>

</body>
</html>
