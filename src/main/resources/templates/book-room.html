<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Book a Room</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      color: #2c3e50;
    }

    .top-nav {
      background: #1f3c58;
      padding: 15px;
      text-align: center;
    }

    .top-nav a {
      display: inline-block;
      margin: 0 10px;
      padding: 10px 14px;
      background: white;
      color: #1f3c58;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .top-nav a:hover {
      background: #dfe6ec;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 20px 20px;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .hero p {
      color: #666;
      margin-top: 0;
    }

    .form-box {
      max-width: 650px;
      margin: 0 auto 50px auto;
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .error-box {
      background: #fdecea;
      color: #c0392b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: bold;
      text-align: left;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background: #1e8449;
    }
  </style>
</head>
<body>

<div class="top-nav">
  <a href="/browse">Browse Rooms</a>
  <a href="/guest-map">View Floor Map</a>
  <a href="/recommend">Get Recommendation</a>
  <a href="/book-room">Book a Room</a>
  <a href="/login">Admin Login</a>
</div>

<div class="hero">
  <h1>Complete Your Booking</h1>
  <p>Enter your stay details below to submit your room request.</p>
</div>

<div class="form-box">

  <div th:if="${error}" class="error-box">
    <span th:text="${error}"></span>
  </div>

  <form th:action="@{/book-room}" th:object="${booking}" method="post">

    <label>Guest Name</label>
    <input type="text" th:field="*{guestName}" required>

    <label>Room Number</label>
    <select th:field="*{roomNumber}" required>
      <option value="">Select a room</option>
      <option th:each="room : ${rooms}"
              th:value="${room.roomNumber}"
              th:text="${room.roomNumber + ' - ' + room.type}">
      </option>
    </select>

    <label>Check-In Date</label>
    <input type="date" th:field="*{checkInDate}" required>

    <label>Check-Out Date</label>
    <input type="date" th:field="*{checkOutDate}" required>

    <button type="submit">Submit Booking Request</button>
  </form>
</div>

</body>
</html>
