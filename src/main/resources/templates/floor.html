<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Hotel Floor Layout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 0;
            color: #2c3e50;
        }

        .top-nav {
            background: #1f3c58;
            padding: 15px;
            text-align: center;
        }

        .top-nav a {
            display: inline-block;
            margin: 0 8px;
            padding: 10px 14px;
            background: white;
            color: #1f3c58;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .top-nav a:hover {
            background: #dfe6ec;
        }

        .hero {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        .hero p {
            color: #666;
            margin-top: 0;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0 35px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        .available {
            background: #d4efdf;
            color: #1e8449;
        }

        .occupied {
            background: #fadbd8;
            color: #c0392b;
        }

        .cleaning {
            background: #fcf3cf;
            color: #b7950b;
        }

        .floor-wrapper {
            max-width: 1200px;
            margin: 0 auto 50px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .floor {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
        }

        .side {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 20px;
        }

        .room-link {
            text-decoration: none;
        }

        .room {
            width: 120px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: 0.2s;
        }

        .room:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        .hallway {
            width: 140px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            color: #34495e;
        }

        .floor-section {
            margin-bottom: 50px;
        }

    </style>
</head>

<body>

<div class="top-nav">
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/rooms">Rooms</a>
    <a href="/floor">Floor Layout</a>
    <a href="/map">Floor Map</a>
    <a href="/bookings">Bookings</a>
    <a href="/analytics">Analytics</a>
    <a href="/browse">Guest Site</a>
    <a href="/logout">Logout</a>
</div>

<div class="hero">
    <h1>Hotel Floor Layout</h1>
    <p>Quickly view room status across the hotel floor using a simplified visual layout.</p>
</div>

<div class="legend">
    <span class="legend-item available">
        Available: <span th:text="${availableCount}"></span>
    </span>

    <span class="legend-item occupied">
        Occupied: <span th:text="${occupiedCount}"></span>
    </span>

    <span class="legend-item cleaning">
        Cleaning: <span th:text="${cleaningCount}"></span>
    </span>
</div>

<div th:each="floorNum : ${floors}" class="floor-section">

    <h2 style="text-align:center; margin-bottom:20px;">Floor [[${floorNum}]]</h2>

    <div class="floor-wrapper">
        <div class="floor">

            <div class="side">
                <div th:each="room : ${rooms}" th:if="${room.side == 'LEFT' and room.floor == floorNum}">
                    <a th:href="@{/toggle/{id}(id=${room.id})}" class="room-link">
                        <div th:class="'room ' + (${room.status} == 'OCCUPIED' ? 'occupied' : (${room.status} == 'CLEANING' ? 'cleaning' : 'available'))">
                            <span th:text="${room.roomNumber}"></span>
                        </div>
                    </a>
                </div>
            </div>

            <div class="hallway">
                Hallway
            </div>

            <div class="side">
                <div th:each="room : ${rooms}" th:if="${room.side == 'RIGHT' and room.floor == floorNum}">
                    <a th:href="@{/toggle/{id}(id=${room.id})}" class="room-link">
                        <div th:class="'room ' + (${room.status} == 'OCCUPIED' ? 'occupied' : (${room.status} == 'CLEANING' ? 'cleaning' : 'available'))">
                            <span th:text="${room.roomNumber}"></span>
                        </div>
                    </a>
                </div>
            </div>

        </div>
    </div>

</div>

</body>

</html>
