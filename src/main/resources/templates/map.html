<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Geometry Floor Map</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      color: #2c3e50;
      text-align: center;
    }

    .top-nav {
      background: #1f3c58;
      padding: 15px;
      text-align: center;
    }

    .top-nav a {
      display: inline-block;
      margin: 0 8px;
      padding: 10px 14px;
      background: white;
      color: #1f3c58;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .top-nav a:hover {
      background: #dfe6ec;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 20px 20px;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .hero p {
      color: #666;
      margin-top: 0;
    }

    .controls-box {
      max-width: 1200px;
      margin: 0 auto 30px auto;
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .filter-bar {
      margin-bottom: 15px;
    }

    .filter-btn {
      display: inline-block;
      margin: 0 8px;
      padding: 8px 14px;
      background: #34495e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .filter-btn:hover {
      background: #2c3e50;
    }

    .current-filter {
      font-weight: bold;
      margin: 12px 0 18px 0;
    }

    .zoom-controls {
      margin-bottom: 5px;
    }

    .zoom-controls button {
      margin: 0 8px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #34495e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .zoom-controls button:hover {
      background: #2c3e50;
    }

    .floor-section {
      margin-bottom: 50px;
    }

    .floor-section h2 {
      margin-bottom: 15px;
    }

    .map-wrapper {
      width: 100%;
      overflow: auto;
      margin-bottom: 30px;
    }

    .map-container {
      position: relative;
      width: 1320px;
      height: 650px;
      background: #ecf0f1;
      border: 2px solid #ccc;
      margin: 0 auto;
      overflow: hidden;
    }

    .zoom-target {
      transform-origin: top left;
      transition: transform 0.2s ease;
    }

    .room {
      position: absolute;
      width: 70px;
      height: 45px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: bold;
      color: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      text-decoration: none;
    }

    .room:hover {
      transform: scale(1.05);
      cursor: pointer;
    }

    .available {
      background: #27ae60;
    }

    .occupied {
      background: #e74c3c;
    }

    .cleaning {
      background: #f1c40f;
      color: black;
    }

    .hallway {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 4px;
      background: #555;
      transform: translateY(-50%);
    }

    .hallway span {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      background: #ecf0f1;
      padding: 2px 10px;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="top-nav">
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/rooms">Rooms</a>
  <a href="/floor">Floor Layout</a>
  <a href="/map">Floor Map</a>
  <a href="/bookings">Bookings</a>
  <a href="/analytics">Analytics</a>
  <a href="/browse">Guest Site</a>
  <a href="/logout">Logout</a>
</div>

<div class="hero">
  <h1>Geometry Floor Map</h1>
  <p>Inspect room placement across multiple floors with filters, zoom, and direct room access.</p>
</div>

<div class="controls-box">
  <div class="filter-bar">
    <a th:href="@{/map(status='ALL')}" class="filter-btn">All Rooms</a>
    <a th:href="@{/map(status='AVAILABLE')}" class="filter-btn">Available Only</a>
    <a th:href="@{/map(status='OCCUPIED')}" class="filter-btn">Occupied Only</a>
    <a th:href="@{/map(status='CLEANING')}" class="filter-btn">Cleaning Only</a>
  </div>

  <p class="current-filter">
    Current Filter: <span th:text="${selectedStatus}"></span>
  </p>

  <div class="zoom-controls">
    <button type="button" onclick="zoomIn()">Zoom In</button>
    <button type="button" onclick="zoomOut()">Zoom Out</button>
    <button type="button" onclick="resetZoom()">Reset</button>
  </div>
</div>

<div th:each="floor : ${floors}" class="floor-section">

  <h2>Floor [[${floor}]]</h2>

  <div class="map-wrapper">
    <div class="map-container zoom-target">

      <div class="hallway">
        <span>HALLWAY</span>
      </div>

      <a th:each="room : ${rooms}"
         th:if="${room.floor == floor}"
         th:href="@{/rooms/details/{id}(id=${room.id})}"
         th:class="'room ' + (${room.status} == 'OCCUPIED' ? 'occupied' : (${room.status} == 'CLEANING' ? 'cleaning' : 'available'))"
         th:style="'left:' + ((${room.x} - 1) * 115 + 40) + 'px; top:' + (${room.y} * 95) + 'px;'">

        <span th:text="${room.roomNumber}"></span>

      </a>

    </div>
  </div>

</div>

<script>
  let zoomLevel = 1;

  function applyZoom() {
    document.querySelectorAll('.zoom-target').forEach(map => {
      map.style.transform = `scale(${zoomLevel})`;
    });
  }

  function zoomIn() {
    zoomLevel += 0.1;
    applyZoom();
  }

  function zoomOut() {
    if (zoomLevel > 0.5) {
      zoomLevel -= 0.1;
      applyZoom();
    }
  }

  function resetZoom() {
    zoomLevel = 1;
    applyZoom();
  }
</script>

</body>
</html>
