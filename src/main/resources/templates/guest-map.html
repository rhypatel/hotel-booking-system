<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hotel Floor Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 0;
            color: #2c3e50;
            text-align: center;
        }

        .top-nav {
            background: #1f3c58;
            padding: 15px 20px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .top-nav a {
            display: inline-block;
            padding: 10px 14px;
            background: white;
            color: #1f3c58;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.22s ease;
            margin: 0;
        }

        .top-nav a:hover {
            background: #dfe6ec;
        }

        .hero {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        .hero p {
            color: #666;
            margin-top: 0;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0 35px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        .guest-room {
            background: #2c4d6d;
            color: white;
        }

        .floor-section {
            margin-bottom: 50px;
        }

        .map-wrapper {
            width: 100%;
            overflow: auto;
            margin-bottom: 30px;
        }

        .map-container {
            position: relative;
            width: 1320px;
            height: 650px;
            background: #ecf0f1;
            border: 2px solid #ccc;
            margin: 0 auto;
            overflow: hidden;
        }

        .room {
            position: absolute;
            width: 70px;
            height: 45px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .hallway {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #555;
            transform: translateY(-50%);
        }

        .hallway span {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #ecf0f1;
            padding: 2px 10px;
            font-weight: bold;
            font-size: 16px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="/browse">Browse Rooms</a>
    <a href="/photos">Photos</a>
    <a href="/guest-map">View Floor Map</a>
    <a href="/recommend">Get Recommendation</a>
    <a href="/book-room">Book a Room</a>
    <a href="/manage-booking">Manage Reservation</a>

    <a th:if="${session.guestUserEmail != null}" href="/guest-dashboard">Guest Dashboard</a>
    <a th:if="${session.guestUserEmail != null}" href="/guest-logout">Logout</a>

    <a th:if="${session.guestUserEmail == null}" href="/guest-login">Guest Login</a>
    <a th:if="${session.guestUserEmail == null}" href="/guest-signup">Guest Sign Up</a>

    <a href="/login">Admin Login</a>
</div>

<div class="hero">
    <h1>Hotel Floor Map</h1>
    <p>Use this map to view room locations across hotel floors and help find your room.</p>
</div>

<div th:each="floor : ${floors}" class="floor-section">

    <h2>Floor [[${floor}]]</h2>

    <div class="map-wrapper">
        <div class="map-container">

            <div class="hallway">
                <span>HALLWAY</span>
            </div>

            <div th:each="room : ${rooms}"
                 th:if="${room.floor == floor}"
                 class="room guest-room"
                 th:style="'left:' + ((${room.x} - 1) * 115 + 40) + 'px; top:' + (${room.y} * 95) + 'px;'">

                <span th:text="${room.roomNumber}"></span>

            </div>

        </div>
    </div>

</div>

</body>
</html>
